name: CI-CD (Auto Beta + Manual Prod)

permissions:
  contents: write

on:
  push:
    branches:
      - sprint/*
      - develop

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, beta, main]

      version:
        description: "Optional: Enter version (leave empty for latest)"
        required: false

jobs:

  # =========================
  # 🚀 VERSIONING
  # =========================
  versioning:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' &&
      (
        startsWith(github.ref_name, 'sprint/') ||
        github.ref_name == 'develop'
      )

    outputs:
      created_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Version Tag
        id: tag
        run: |
          git fetch --tags --force

          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.0.0"
          fi

          BASE_VERSION=$(echo $LAST_TAG | cut -d'-' -f1)
          VERSION=${BASE_VERSION#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%B)
          DATE=$(date +%Y-%m-%d)

          # Detect type
          if [[ "$COMMIT_MSG" == *"enhancement/"* ]]; then
            TYPE="major"
          elif [[ "$COMMIT_MSG" == *"feature/"* ]]; then
            TYPE="minor"
          else
            TYPE="patch"
          fi

          # Sprint → always patch with date
          if [[ "$BRANCH" == sprint/* ]]; then
            PATCH=$((PATCH+1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH-$DATE"

          # Develop → final version
          elif [[ "$BRANCH" == "develop" ]]; then
            if [[ "$TYPE" == "major" ]]; then
              MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
              NEW_TAG="v$MAJOR.$MINOR.$PATCH"
            elif [[ "$TYPE" == "minor" ]]; then
              MINOR=$((MINOR+1)); PATCH=0
              NEW_TAG="v$MAJOR.$MINOR.$PATCH"
            else
              PATCH=$((PATCH+1))
              NEW_TAG="v$MAJOR.$MINOR.$PATCH-$DATE"
            fi
          fi

          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
            git push origin "$NEW_TAG"
          fi


  # =========================
  # 🚀 AUTO DEPLOY TO BETA
  # =========================
  deploy-beta:
    needs: versioning
    runs-on: ubuntu-latest

    if: github.ref_name == 'develop'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Beta
        run: |
          VERSION="${{ needs.versioning.outputs.created_tag }}"

          echo "Auto deploying $VERSION to beta"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch --tags --force

          git branch -f beta $VERSION
          git push origin beta --force

          git checkout $VERSION

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          IMAGE="${{ secrets.DOCKER_USERNAME }}/stage-test"

          docker build -t $IMAGE:$VERSION .
          docker push $IMAGE:$VERSION


  # =========================
  # 🚀 MANUAL DEPLOY TO PROD
  # =========================
  deploy-prod:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Version
        id: version
        run: |
          git fetch --tags --force

          if [[ -z "${{ github.event.inputs.version }}" ]]; then
            VERSION=$(git tag --sort=-v:refname | head -n 1)
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          echo "resolved=$VERSION" >> $GITHUB_OUTPUT

      - name: Deploy to Main
        run: |
          VERSION="${{ steps.version.outputs.resolved }}"

          echo "Deploying $VERSION to main"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git branch -f main $VERSION
          git push origin main --force

          git checkout $VERSION

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          IMAGE="${{ secrets.DOCKER_USERNAME }}/prod-test"

          docker build -t $IMAGE:$VERSION .
          docker push $IMAGE:$VERSION
