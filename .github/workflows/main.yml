name: CI-CD (Preview + Controlled Release + Cleanup)

permissions:
  contents: write

on:
  push:
    branches:
      - develop

  pull_request:
    types: [opened, synchronize, reopened, closed]

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, beta, main]
      version:
        description: "Version tag (e.g. v1.2.003-2026-04-23)"
        required: true

jobs:

# =========================
# 🔖 VERSIONING (ONLY DEVELOP)
# =========================
  versioning:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'push' && github.ref_name == 'develop'

    outputs:
      created_tag: ${{ steps.calc.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - id: calc
        shell: powershell
        run: |
          git fetch --tags --force
          $date = Get-Date -Format "yyyy-MM-dd"

          $lastTag = git tag --list "v*.[0-9][0-9][0-9]-*" |
            ForEach-Object { $_ -replace "-.*","" -replace "^v","" } |
            Sort-Object { ($_ -split '\.')[0,1,2] } |
            Select-Object -Last 1

          if (-not $lastTag) { $lastTag = "1.0.000" }

          $parts = $lastTag.Split(".")
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          $commitMsg = (git log -1 --pretty=%s).ToLower()

          if ($commitMsg -like "*enhancement*") {
            $major++; $minor=0; $patch=0
          } elseif ($commitMsg -like "*feature*") {
            $minor++; $patch=0
          } else {
            $patch++
          }

          $patchPadded = "{0:D3}" -f $patch
          $newTag = "v$major.$minor.$patchPadded-$date"

          echo "version=$newTag" >> $env:GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          $exists = git tag -l $newTag
          if (-not $exists) {
            git tag -a $newTag -m "Release $newTag"
            git push origin $newTag
          }

# =========================
# 🚀 PREVIEW DEPLOY (PR ONLY)
# =========================
  preview-deploy:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4

      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Set variables
        shell: powershell
        run: |
          $branch = "${{ github.event.pull_request.head.ref }}"
          $name = $branch.ToLower() -replace '[^a-z0-9]', '-'

          $namespace = $name
          $ingressHost = "$name.127.0.0.1.nip.io"
          $image = "${{ secrets.DOCKER_USERNAME }}/aesthisia-demo:$name-${{ github.run_number }}"

          "NAMESPACE=$namespace" >> $env:GITHUB_ENV
          "INGRESS_HOST=$ingressHost" >> $env:GITHUB_ENV
          "IMAGE=$image" >> $env:GITHUB_ENV

      - name: Docker Login
        shell: powershell
        run: docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Build & Push Image
        shell: powershell
        run: |
          docker build -t $env:IMAGE .
          docker push $env:IMAGE

      - name: Create Namespace
        shell: powershell
        run: |
          kubectl create namespace $env:NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      - name: Prepare Manifest
        shell: powershell
        run: |
          (Get-Content deployment.yml) `
            -replace 'NAMESPACE_PLACEHOLDER', "$env:NAMESPACE" `
            -replace 'IMAGE_PLACEHOLDER', "$env:IMAGE" `
            -replace 'HOST_PLACEHOLDER', "$env:INGRESS_HOST" |
            Set-Content rendered.yml

      - name: Apply Preview
        shell: powershell
        run: |
          kubectl apply -n $env:NAMESPACE -f rendered.yml

      - name: Show URL
        shell: powershell
        run: echo "🚀 Preview: http://$env:INGRESS_HOST"

# =========================
# 🧹 CLEANUP
# =========================
  cleanup:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Delete Namespace
        shell: powershell
        run: |
          $branch = "${{ github.event.pull_request.head.ref }}"
          $name = $branch.ToLower() -replace '[^a-z0-9]', '-'

          kubectl delete namespace $name --ignore-not-found=true

# =========================
# 🌍 MANUAL DEPLOY
# =========================
  deploy:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'workflow_dispatch'

    env:
      ENVIRONMENT: ${{ inputs.environment }}
      VERSION: ${{ inputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Set Config
        shell: powershell
        run: |
          $envName = "$env:ENVIRONMENT"
          $version = "$env:VERSION"

          if ($envName -eq "develop") {
            $image = "${{ secrets.DOCKER_USERNAME }}/aesthisia-demo:$version"
          } elseif ($envName -eq "beta") {
            $image = "${{ secrets.DOCKER_USERNAME }}/stage-test:$version"
          } else {
            $image = "${{ secrets.DOCKER_USERNAME }}/prod-test:$version"
          }

          $ingressHost = "$envName.127.0.0.1.nip.io"

          "IMAGE=$image" >> $env:GITHUB_ENV
          "INGRESS_HOST=$ingressHost" >> $env:GITHUB_ENV
          "NAMESPACE=$envName" >> $env:GITHUB_ENV

      - name: Prepare Manifest
        shell: powershell
        run: |
          (Get-Content deployment.yml) `
            -replace 'IMAGE_PLACEHOLDER', "$env:IMAGE" `
            -replace 'HOST_PLACEHOLDER', "$env:INGRESS_HOST" |
            Set-Content rendered.yml

      - name: Deploy
        shell: powershell
        run: |
          kubectl apply -n $env:NAMESPACE -f rendered.yml
