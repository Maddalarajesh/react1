name: CI-CD (Preview + Controlled Release + Cleanup)

permissions:
  contents: write

on:
  push:
    branches:
      - develop
      - beta
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, beta, main]
      version:
        description: "Optional version (tag)"
        required: false

jobs:
  versioning:
    runs-on: [self-hosted, Windows, X64]
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'closed' &&
        github.event.pull_request.merged == true &&
        startsWith(github.base_ref, 'feature/')
      )
      ||
      (
        github.event_name == 'push' &&
        github.ref_name == 'develop'
      )

    outputs:
      created_tag: ${{ steps.calc.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - id: calc
        shell: powershell
        run: |
          git fetch --tags --force

          $date = Get-Date -Format "yyyy-MM-dd"

          $todayTags = git tag --list "v*.[0-9][0-9][0-9]-$date"

          if ($todayTags) {
            $lastTag = $todayTags |
              ForEach-Object { $_ -replace "-$date","" -replace "^v","" } |
              Sort-Object { ($_ -split '\.')[0,1,2] } |
              Select-Object -Last 1
          } else {
            $lastTag = git tag --list "v*.[0-9][0-9][0-9]-*" |
              ForEach-Object { $_ -replace "-.*","" -replace "^v","" } |
              Sort-Object { ($_ -split '\.')[0,1,2] } |
              Select-Object -Last 1

            if (-not $lastTag) { $lastTag = "1.0.000" }
          }

          $version = $lastTag
          $parts = $version.Split(".")
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          $commitMsg = (git log -1 --pretty=%s).ToLower()

          if ($commitMsg -like "*enhancement*") {
            $major++; $minor=0; $patch=0
          }
          elseif ($commitMsg -like "*feature*") {
            $minor++; $patch=0
          }
          else {
            $patch++
          }

          $patchPadded = "{0:D3}" -f $patch
          $newTag = "v$major.$minor.$patchPadded-$date"

          echo "version=$newTag" >> $env:GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag -a $newTag -m "Release $newTag"
          git push origin $newTag


  preview-deploy:
    runs-on: [self-hosted, Windows, X64]
    if: |
      github.event_name == 'pull_request' && 
      github.event.action != 'closed' &&
      contains(github.head_ref, '/') 

    steps:
      - uses: actions/checkout@v4

      - name: Set dynamic variables
        shell: powershell
        run: |
          $branch = "${{ github.head_ref }}"
          $name = $branch.ToLower() -replace '[^a-z0-9]', '-'
          $namespace = $name
          $ingressHost = "$name.127.0.0.1.nip.io"
          $image = "${{ secrets.DOCKER_USERNAME }}/aesthisia-demo:$name-${{ github.run_number }}"

          "NAMESPACE=$namespace" >> $env:GITHUB_ENV
          "HOST=$ingressHost" >> $env:GITHUB_ENV
          "IMAGE=$image" >> $env:GITHUB_ENV

      - name: Docker Login & Build
        shell: powershell
        run: |
          docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"
          docker build -t $env:IMAGE .
          docker push $env:IMAGE

      - name: Deploy to Dynamic Namespace
        shell: powershell
        run: |
          kubectl create namespace $env:NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          (Get-Content deployment.yml) `
            -replace 'NAMESPACE_PLACEHOLDER', "$env:NAMESPACE" `
            -replace 'IMAGE_PLACEHOLDER', "$env:IMAGE" `
            -replace 'HOST_PLACEHOLDER', "$env:HOST" |
            kubectl apply -n $env:NAMESPACE -f -

          kubectl set env deployment/sample-app BROWSER=none -n $env:NAMESPACE


  cleanup:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && contains(github.head_ref, '/')

    steps:
      - name: Delete Dynamic Namespace
        shell: powershell
        run: |
          $name = "${{ github.head_ref }}".ToLower() -replace '[^a-z0-9]', '-'
          kubectl delete namespace $name --ignore-not-found=true


  deploy:
    runs-on: [self-hosted, Windows, X64]
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'push' && (github.ref_name == 'develop' || github.ref_name == 'beta' || github.ref_name == 'main'))

    steps:
      - name: Resolve Target Config
        id: target
        shell: powershell
        run: |
          git fetch --tags

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $envName = "${{ github.event.inputs.environment }}"

            if ("${{ github.event.inputs.version }}") {
              $version = "${{ github.event.inputs.version }}"
            } else {
              $version = git describe --tags --abbrev=0
            }
          } else {
            $envName = "${{ github.ref_name }}"
            $version = git describe --tags --abbrev=0
          }

          if ($envName -eq "develop") { $repo = "aesthisia-demo" }
          elseif ($envName -eq "beta") { $repo = "stage-test" }
          else { $repo = "prod-test" }

          "ENV=$envName" >> $env:GITHUB_OUTPUT
          "REPO=$repo" >> $env:GITHUB_OUTPUT
          "VER=$version" >> $env:GITHUB_OUTPUT


      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.VER }}


      - name: Docker Build & Push
        shell: powershell
        run: |
          $image = "${{ secrets.DOCKER_USERNAME }}/${{ steps.target.outputs.REPO }}:${{ steps.target.outputs.VER }}"
          docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"
          docker build -t $image .
          docker push $image

          "FINAL_IMAGE=$image" >> $env:GITHUB_ENV


      - name: Deploy to Fixed Namespace
        shell: powershell
        run: |
          $envName = "${{ steps.target.outputs.ENV }}"
          $ingressHost = "$envName.127.0.0.1.nip.io"

          kubectl create namespace $envName --dry-run=client -o yaml | kubectl apply -f -

          (Get-Content deployment.yml) `
            -replace 'NAMESPACE_PLACEHOLDER', "$envName" `
            -replace 'IMAGE_PLACEHOLDER', "$env:FINAL_IMAGE" `
            -replace 'HOST_PLACEHOLDER', "$ingressHost" |
            kubectl apply -n $envName -f -

          kubectl set env deployment/sample-app BROWSER=none -n $envName


  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'main'
    steps:
      - name: Wait and Invoke Lambda
        run: |
          sleep 1200
          aws lambda invoke --function-name Deepcarve_Backendwebsite_healthchecks --invocation-type RequestResponse response.json
