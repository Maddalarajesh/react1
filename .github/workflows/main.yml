name: CI-CD (Preview + Controlled Release + Cleanup)

permissions:
  contents: write

on:
  push:
    branches:
      - feature/*
      - develop

  pull_request:
    types: [opened, synchronize, reopened, closed]

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, beta, main]
      version:
        description: "Optional version"
        required: false

jobs:

  versioning:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'push' && startsWith(github.ref_name, 'feature/')

    steps:
      - uses: actions/checkout@v4

      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Create Tag
        shell: powershell
        run: |
          git fetch --tags --force
          $date = Get-Date -Format "yyyy-MM-dd"
          $tag = "v1.0.$(Get-Random)-$date"
          git tag $tag
          git push origin $tag


  preview-deploy:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4

      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Set variables
        shell: powershell
        run: |
          $branch = "${{ github.event.pull_request.head.ref }}"
          $safe = $branch -replace '[^a-zA-Z0-9]', '-'

          "NAMESPACE=$safe" >> $env:GITHUB_ENV
          "HOST=$safe.127.0.0.1.nip.io" >> $env:GITHUB_ENV
          "IMAGE=${{ secrets.DOCKER_USERNAME }}/aesthisia-demo:$safe-${{ github.run_number }}" >> $env:GITHUB_ENV

      # ✅ FIXED DOCKER LOGIN (NO WSL PIPE ISSUE)
      - name: Docker Login
        shell: powershell
        run: |
          docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Build & Push Image
        shell: powershell
        run: |
          docker build -t $env:IMAGE .
          docker push $env:IMAGE

      - name: Create Namespace
        shell: powershell
        run: kubectl create namespace $env:NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        shell: powershell
        run: |
          (Get-Content deployment.yml) `
            -replace 'NAMESPACE_PLACEHOLDER', "$env:NAMESPACE" `
            -replace 'IMAGE_PLACEHOLDER', "$env:IMAGE" `
            -replace 'HOST_PLACEHOLDER', "$env:HOST" |
            kubectl apply -n $env:NAMESPACE -f -

      - name: Show URL
        shell: powershell
        run: echo "http://$env:HOST"


  cleanup:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Delete Namespace
        shell: powershell
        run: |
          $branch = "${{ github.event.pull_request.head.ref }}"
          $safe = $branch -replace '[^a-zA-Z0-9]', '-'
          kubectl delete namespace $safe --ignore-not-found=true


  deploy:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'workflow_dispatch'

    env:
      INPUT_ENV: ${{ inputs.environment }}
      INPUT_VERSION: ${{ inputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Resolve Version
        id: version
        shell: powershell
        run: |
          git fetch --tags --force

          if ([string]::IsNullOrEmpty($env:INPUT_VERSION)) {
            $version = git tag --sort=-v:refname | Select-Object -First 1
          } else {
            $version = $env:INPUT_VERSION
          }

          "resolved=$version" >> $env:GITHUB_OUTPUT

      # ✅ FIXED DOCKER LOGIN
      - name: Docker Login
        shell: powershell
        run: |
          docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Build & Push
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.resolved }}"
          $envName = $env:INPUT_ENV

          if ($envName -eq "develop") {
            $image = "${{ secrets.DOCKER_USERNAME }}/aesthisia-demo:$version"
          } elseif ($envName -eq "beta") {
            $image = "${{ secrets.DOCKER_USERNAME }}/stage-test:$version"
          } else {
            $image = "${{ secrets.DOCKER_USERNAME }}/prod-test:$version"
          }

          docker build -t $image .
          docker push $image

          kubectl create namespace $envName --dry-run=client -o yaml | kubectl apply -f -

          (Get-Content deployment.yml) `
            -replace 'IMAGE_PLACEHOLDER', "$image" `
            -replace 'HOST_PLACEHOLDER', "$envName.127.0.0.1.nip.io" |
            kubectl apply -n $envName -f -


  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'main'

    steps:
      - name: Wait
        run: sleep 1200

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_LAMBDA }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_LAMBDA }}
          aws-region: us-east-2

      - name: Invoke Lambda
        run: |
          aws lambda invoke \
            --function-name Deepcarve_Backendwebsite_healthchecks \
            --invocation-type RequestResponse \
            response.json

          cat response.json
