name: CI-CD (Manual Deploy + Auto Versioning)

permissions:
  contents: write

on:
  push:
    branches:
      - epic/*
      - develop

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, beta, main]

      version:
        description: "Optional: Enter version (leave empty for latest)"
        required: false

jobs:

  # =========================
  # 🚀 VERSIONING (AUTO)
  # =========================
  versioning:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' &&
      (
        startsWith(github.ref_name, 'epic/') ||
        github.ref_name == 'develop'
      )

    outputs:
      created_tag: ${{ steps.calc.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: calc
        run: |
          git fetch --tags --force

          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.0.0"
          fi

          VERSION=${LAST_TAG#v}
          BASE_VERSION=$(echo $VERSION | cut -d'-' -f1)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          DATE=$(date +%Y-%m-%d)

          # 🔥 Get commit message
          COMMIT_MSG=$(git log -1 --pretty=%s | tr '[:upper:]' '[:lower:]')

          echo "Commit message: $COMMIT_MSG"

          # =========================
          # 🎯 VERSION RULES
          # =========================
          if [[ "$COMMIT_MSG" == enhancement* ]]; then
            echo "🚀 Major release detected"
            MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"

          elif [[ "$COMMIT_MSG" == feature* ]]; then
            echo "✨ Minor release detected"
            MINOR=$((MINOR+1)); PATCH=0
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"

          elif [[ "$COMMIT_MSG" == hotfix* || "$COMMIT_MSG" == bugfix* ]]; then
            echo "🐛 Patch release detected"
            PATCH=$((PATCH+1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH-$DATE"

          else
            echo "⚠️ Default patch (fallback)"
            PATCH=$((PATCH+1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH-$DATE"
          fi

          echo "New tag: $NEW_TAG"
          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # 🛑 Prevent duplicate tag push
          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
            git push origin "$NEW_TAG"
          else
            echo "Tag already exists, skipping push"
          fi


  # =========================
  # 🚀 MANUAL DEPLOY (SAFE)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Version
        id: version
        run: |
          git fetch --tags --force

          if [[ -z "${{ github.event.inputs.version }}" ]]; then
            VERSION=$(git tag --sort=-v:refname | head -n 1)
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          echo "resolved=$VERSION" >> $GITHUB_OUTPUT

      - name: Deploy
        run: |
          VERSION="${{ steps.version.outputs.resolved }}"
          ENV="${{ github.event.inputs.environment }}"

          echo "Deploying $VERSION → $ENV"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch --tags --force

          # 🧪 DEVELOP = TEST ONLY
          if [[ "$ENV" == "develop" ]]; then
            echo "Testing only (no branch update)"
            git checkout $VERSION

          # 🚀 BETA / MAIN = REAL DEPLOY
          else
            git branch -f $ENV $VERSION
            git push origin $ENV --force
            git checkout $VERSION
          fi

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          if [[ "$ENV" == "develop" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/aesthisia-demo"
          elif [[ "$ENV" == "beta" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/stage-test"
          elif [[ "$ENV" == "main" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/prod-test"
          fi

          docker build -t $IMAGE:$VERSION .
          docker push $IMAGE:$VERSION
