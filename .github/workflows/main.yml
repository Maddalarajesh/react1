name: CI-CD (Preview + Controlled Release + Cleanup)

permissions:
  contents: write

on:
  push:
    branches:
      - feature/*
      - develop

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - develop
          - beta
          - main
      version:
        description: "Optional version"
        required: false

jobs:

  versioning:
    runs-on: [self-hosted, Windows, X64]
    if: ${{ github.event_name == 'push' && startsWith(github.ref_name, 'feature/') }}

    steps:
      - uses: actions/checkout@v4

      - name: Create Tag
        shell: powershell
        run: |
          git fetch --tags --force
          $date = Get-Date -Format "yyyy-MM-dd"
          $tag = "v1.0.$(Get-Random)-$date"
          git tag $tag
          git push origin $tag


  preview-deploy:
    runs-on: [self-hosted, Windows, X64]
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        shell: powershell
        run: |
          $branch = "${{ github.event.pull_request.head.ref }}"
          $safe = $branch -replace '[^a-zA-Z0-9]', '-'

          "NAMESPACE=$safe" | Out-File -FilePath $env:GITHUB_ENV -Append
          "HOST=$safe.127.0.0.1.nip.io" | Out-File -FilePath $env:GITHUB_ENV -Append
          "IMAGE=${{ secrets.DOCKER_USERNAME }}/aesthisia-demo:$safe-${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Image
        run: |
          docker build -t $env:IMAGE .
          docker push $env:IMAGE

      - name: Create Namespace
        run: kubectl create namespace $env:NAMESPACE || exit 0

      - name: Deploy to Kubernetes
        shell: powershell
        run: |
          $content = Get-Content deployment.yml
          $content = $content -replace 'IMAGE_PLACEHOLDER', "$env:IMAGE"
          $content = $content -replace 'HOST_PLACEHOLDER', "$env:HOST"
          $content | Set-Content final.yml

          kubectl apply -n $env:NAMESPACE -f final.yml

      - name: Show Preview URL
        run: echo "🚀 Preview: http://$env:HOST"


  cleanup:
    runs-on: [self-hosted, Windows, X64]
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' }}

    steps:
      - name: Delete Namespace
        shell: powershell
        run: |
          $branch = "${{ github.event.pull_request.head.ref }}"
          $safe = $branch -replace '[^a-zA-Z0-9]', '-'
          kubectl delete namespace $safe --ignore-not-found=true


  deploy:
    runs-on: [self-hosted, Windows, X64]
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve Version
        id: version
        shell: powershell
        run: |
          git fetch --tags --force

          $inputVersion = "${{ github.event.inputs.version }}"

          if ([string]::IsNullOrEmpty($inputVersion)) {
            $version = git tag --sort=-v:refname | Select-Object -First 1
          } else {
            $version = $inputVersion
          }

          "resolved=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Image
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.resolved }}"
          $envName = "${{ github.event.inputs.environment }}"

          if ($envName -eq "develop") {
            $image = "${{ secrets.DOCKER_USERNAME }}/aesthisia-demo:$version"
          } elseif ($envName -eq "beta") {
            $image = "${{ secrets.DOCKER_USERNAME }}/stage-test:$version"
          } elseif ($envName -eq "main") {
            $image = "${{ secrets.DOCKER_USERNAME }}/prod-test:$version"
          }

          docker build -t $image .
          docker push $image

          kubectl create namespace $envName || exit 0

          $content = Get-Content deployment.yml
          $content = $content -replace 'IMAGE_PLACEHOLDER', "$image"
          $content = $content -replace 'HOST_PLACEHOLDER', "$envName.127.0.0.1.nip.io"
          $content | Set-Content final.yml

          kubectl apply -n $envName -f final.yml


  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'main' }}

    steps:
      - name: Wait 20 minutes
        run: sleep 1200

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_LAMBDA }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_LAMBDA }}
          aws-region: us-east-2

      - name: Trigger Lambda
        run: |
          aws lambda invoke \
            --function-name Deepcarve_Backendwebsite_healthchecks \
            --invocation-type RequestResponse \
            response.json
          cat response.json
