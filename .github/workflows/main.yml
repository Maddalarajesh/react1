name: CI-CD (Preview + Controlled Release + Cleanup)

permissions:
  contents: write

on:
  push:
    branches:
      - '**' # Trigger on all branches to be safe
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, beta, main]
      version:
        description: "Optional version"
        required: false

jobs:
  versioning:
    runs-on: [self-hosted, Windows, X64]
    # Only version on actual merges/pushes to develop or feature-level branches
    if: |
      github.event_name == 'push' &&
      (github.ref_name == 'develop' || startsWith(github.ref_name, 'feature/'))
    outputs:
      created_tag: ${{ steps.calc.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force
      - id: calc
        shell: powershell
        run: |
          git fetch --tags --force
          $date = Get-Date -Format "yyyy-MM-dd"
          $todayTags = git tag --list "v*.[0-9][0-9][0-9]-$date"
          if ($todayTags) {
            $lastTag = $todayTags | ForEach-Object { $_ -replace "-$date","" -replace "^v","" } | Sort-Object { ($_ -split '\.')[0,1,2] } | Select-Object -Last 1
            $lastTag = "v$lastTag-$date"
          } else {
            $lastTag = git tag --list "v*.[0-9][0-9][0-9]-*" | ForEach-Object { $_ -replace "-.*","" -replace "^v","" } | Sort-Object { ($_ -split '\.')[0,1,2] } | Select-Object -Last 1
            if (-not $lastTag) { $lastTag = "1.0.000" }
            $lastTag = "v$lastTag-$date"
          }
          $version = $lastTag.TrimStart("v")
          $base = $version.Split("-")[0]
          $parts = $base.Split(".")
          $major = [int]$parts[0]; $minor = [int]$parts[1]; $patch = [int]$parts[2]
          $commitMsg = (git log -1 --pretty=%s).ToLower()
          if ($commitMsg -like "*enhancement*") { $major++; $minor=0; $patch=0 }
          elseif ($commitMsg -like "*feature*") { $minor++; $patch=0 }
          else { $patch++ }
          $patchPadded = "{0:D3}" -f $patch
          $newTag = "v$major.$minor.$patchPadded-$date"
          echo "version=$newTag" >> $env:GITHUB_OUTPUT
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -a $newTag -m "Release $newTag"
          git push origin $newTag

  preview-deploy:
    runs-on: [self-hosted, Windows, X64]
    # TRIGGER: Any PR that is NOT from develop, beta, or main
    if: |
      github.event_name == 'pull_request' && 
      github.event.action != 'closed' &&
      github.head_ref != 'develop' &&
      github.head_ref != 'beta' &&
      github.head_ref != 'main'

    steps:
      - uses: actions/checkout@v4
      - name: Build and Deploy Preview
        shell: powershell
        run: |
          $branch = "${{ github.head_ref }}"
          $name = $branch.ToLower() -replace '[^a-z0-9]', '-'
          $image = "${{ secrets.DOCKER_USERNAME }}/aesthisia-demo:$($name)-${{ github.run_number }}"
          $host = "$($name).127.0.0.1.nip.io"
          
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t $image .
          docker push $image

          kubectl create namespace $name --dry-run=client -o yaml | kubectl apply -f -
          
          (Get-Content deployment.yml) `
            -replace 'NAMESPACE_PLACEHOLDER', $name `
            -replace 'IMAGE_PLACEHOLDER', $image `
            -replace 'HOST_PLACEHOLDER', $host | 
            Out-File -FilePath patched-deploy.yml -Encoding utf8
          
          kubectl apply -f patched-deploy.yml -n $name
          kubectl set env deployment/sample-app BROWSER=none -n $name
          kubectl rollout restart deployment/sample-app -n $name

  cleanup:
    runs-on: [self-hosted, Windows, X64]
    if: |
      github.event_name == 'pull_request' && 
      github.event.action == 'closed' && 
      github.head_ref != 'develop' &&
      github.head_ref != 'beta' &&
      github.head_ref != 'main'

    steps:
      - name: Delete Namespace
        shell: powershell
        run: |
          $name = "${{ github.event.pull_request.head.ref }}".ToLower() -replace '[^a-z0-9]', '-'
          kubectl delete namespace $name --ignore-not-found=true

  deploy:
    runs-on: [self-hosted, Windows, X64]
    # TRIGGER: Manual dispatch OR Push to the "permanent" branches
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'push' && (
        github.ref_name == 'develop' || 
        github.ref_name == 'beta' || 
        github.ref_name == 'main' ||
        (startsWith(github.ref_name, 'feature/') && !contains(github.ref_name, '/'))
      ))

    steps:
      - uses: actions/checkout@v4
      - name: Execute Main Deployment
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $envName = "${{ github.event.inputs.environment }}"
            $version = "v-${{ github.run_number }}"
          } else {
            $envName = "${{ github.ref_name }}"
            $version = "build-${{ github.run_number }}"
          }
          
          if ($envName -match "develop|feature") { $repo = "aesthisia-demo" }
          elseif ($envName -eq "beta") { $repo = "stage-test" }
          else { $repo = "prod-test" }

          $image = "${{ secrets.DOCKER_USERNAME }}/$($repo):$version"
          $cleanEnv = $envName.ToLower() -replace '[^a-z0-9]', '-'
          $ingressHost = "$($cleanEnv).127.0.0.1.nip.io"

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t $image .
          docker push $image

          (Get-Content deployment.yml) `
            -replace 'NAMESPACE_PLACEHOLDER', $cleanEnv `
            -replace 'IMAGE_PLACEHOLDER', $image `
            -replace 'HOST_PLACEHOLDER', $ingressHost |
            Out-File -FilePath patched-main.yml -Encoding utf8

          kubectl create namespace $cleanEnv --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f patched-main.yml -n $cleanEnv
          kubectl set env deployment/sample-app BROWSER=none -n $cleanEnv
          kubectl rollout restart deployment/sample-app -n $cleanEnv

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'main'
    steps:
      - name: Wait and Invoke Lambda
        run: |
          sleep 1200
          aws lambda invoke --function-name Deepcarve_Backendwebsite_healthchecks --invocation-type RequestResponse response.json
