name: Runner Debug Test

on:
  workflow_dispatch:

jobs:
  test-runner:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 5

    steps:
      - name: Step 1 - Basic Echo
        shell: powershell
        run: |
          echo "✅ Runner is executing steps"
          echo "Machine: $env:COMPUTERNAME"
          echo "User: $env:USERNAME"

      - name: Step 2 - Check PowerShell
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $ErrorActionPreference = "Stop"
          echo "✅ PowerShell working"

      - name: Step 3 - Check Docker
        shell: powershell
        run: |
          docker version

      - name: Step 4 - Check Kubernetes
        shell: powershell
        run: |
          kubectl version --client
          kubectl get nodes

      - name: Step 5 - Sleep Test
        shell: powershell
        run: |
          echo "Sleeping for 10 seconds..."
          Start-Sleep -Seconds 10
          echo "✅ Completed"
