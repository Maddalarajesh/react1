name: CI-CD (Final Versioning + Safe Deploy)

permissions:
  contents: write

on:
  push:
    branches:
      - sprint/*
      - develop

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, beta, main]

      version:
        description: "Optional: Enter version (leave empty for latest)"
        required: false

      release_type:
        description: "Release type (major | minor | patch)"
        required: false
        default: "patch"

jobs:

  # =========================
  # đźš€ VERSIONING
  # =========================
  versioning:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' &&
      (
        startsWith(github.ref_name, 'sprint/') ||
        github.ref_name == 'develop'
      )

    outputs:
      created_tag: ${{ steps.calc.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: calc
        run: |
          git fetch --tags --force

          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.0.0"
          fi

          VERSION=${LAST_TAG#v}
          BASE_VERSION=$(echo $VERSION | cut -d'-' -f1)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          BRANCH="${{ github.ref_name }}"
          TYPE="${{ github.event.inputs.release_type }}"
          DATE=$(date +%Y-%m-%d)

          # Sprint â†’ always patch
          if [[ "$BRANCH" == sprint/* ]]; then
            PATCH=$((PATCH+1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH-$DATE"

          # Develop â†’ controlled bump
          elif [[ "$BRANCH" == "develop" ]]; then
            if [[ "$TYPE" == "major" ]]; then
              MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
              NEW_TAG="v$MAJOR.$MINOR.$PATCH"
            elif [[ "$TYPE" == "minor" ]]; then
              MINOR=$((MINOR+1)); PATCH=0
              NEW_TAG="v$MAJOR.$MINOR.$PATCH"
            else
              PATCH=$((PATCH+1))
              NEW_TAG="v$MAJOR.$MINOR.$PATCH-$DATE"
            fi
          fi

          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
            git push origin "$NEW_TAG"
          fi


  # =========================
  # đźš€ AUTO DEPLOY TO BETA
  # =========================
  deploy-beta:
    needs: versioning
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Beta
        run: |
          VERSION="${{ needs.versioning.outputs.created_tag }}"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch --tags --force

          git branch -f beta $VERSION
          git push origin beta --force

          git checkout $VERSION

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          IMAGE="${{ secrets.DOCKER_USERNAME }}/stage-test"

          docker build -t $IMAGE:$VERSION .
          docker push $IMAGE:$VERSION


  # =========================
  # đźš€ MANUAL DEPLOY (SAFE)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Version
        id: version
        run: |
          git fetch --tags --force

          if [[ -z "${{ github.event.inputs.version }}" ]]; then
            VERSION=$(git tag --sort=-v:refname | head -n 1)
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          echo "resolved=$VERSION" >> $GITHUB_OUTPUT

      - name: Deploy
        run: |
          VERSION="${{ steps.version.outputs.resolved }}"
          ENV="${{ github.event.inputs.environment }}"

          echo "Deploying $VERSION â†’ $ENV"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch --tags --force

          # âś… DEVELOP = TEST ONLY
          if [[ "$ENV" == "develop" ]]; then
            echo "Testing version (no branch update)"
            git checkout $VERSION

          # âś… BETA / MAIN = REAL DEPLOY
          else
            git branch -f $ENV $VERSION
            git push origin $ENV --force
            git checkout $VERSION
          fi

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          if [[ "$ENV" == "develop" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/aesthisia-demo"
          elif [[ "$ENV" == "beta" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/stage-test"
          elif [[ "$ENV" == "main" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/prod-test"
          fi

          docker build -t $IMAGE:$VERSION .
          docker push $IMAGE:$VERSION
