name: CI-CD (Manual Deploy + Auto Versioning)

permissions:
  contents: write

on:
  push:
    branches:
      - feature/*
      - develop

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, beta, main]

      version:
        description: "Optional: Enter version (leave empty for latest)"
        required: false

jobs:
  versioning:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      (
        startsWith(github.ref_name, 'feature/') ||
        github.ref_name == 'develop'
      )
    outputs:
      created_tag: ${{ steps.calc.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: calc
        run: |
          git fetch --tags --force
          DATE=$(date +%Y-%m-%d)
          TODAY_TAGS=$(git tag --list "v*.[0-9][0-9][0-9]-$DATE")
          if [ -n "$TODAY_TAGS" ]; then
            LAST_TAG=$(echo "$TODAY_TAGS" | sed "s/-$DATE//" | sed 's/^v//' | sort -t. -k1,1n -k2,2n -k3,3n | tail -n 1)
            LAST_TAG="v$LAST_TAG-$DATE"
          else
            LAST_TAG=$(git tag --list "v*.[0-9][0-9][0-9]-*" | sed 's/-.*//' | sed 's/^v//' | sort -t. -k1,1n -k2,2n -k3,3n | tail -n 1)
            [ -z "$LAST_TAG" ] && LAST_TAG="1.0.000"
            LAST_TAG="v$LAST_TAG-$DATE"
          fi
          VERSION=${LAST_TAG#v}
          BASE_VERSION=$(echo $VERSION | cut -d'-' -f1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          PATCH=$((10#$PATCH))
          COMMIT_MSG=$(git log -1 --pretty=%s | tr '[:upper:]' '[:lower:]')
          if [[ "$COMMIT_MSG" == *enhancement* ]]; then MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0;
          elif [[ "$COMMIT_MSG" == *feature* ]]; then MINOR=$((MINOR+1)); PATCH=0;
          else PATCH=$((PATCH+1)); fi
          PATCH_PADDED=$(printf "%03d" $PATCH)
          NEW_TAG="v$MAJOR.$MINOR.$PATCH_PADDED-$DATE"
          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
            git push origin "$NEW_TAG"
          fi

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve Version
        id: version
        run: |
          git fetch --tags --force
          if [[ -z "${{ github.event.inputs.version }}" ]]; then
            VERSION=$(git tag --sort=-v:refname | head -n 1)
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "resolved=$VERSION" >> $GITHUB_OUTPUT
      - name: Deploy
        run: |
          VERSION="${{ steps.version.outputs.resolved }}"
          ENV="${{ github.event.inputs.environment }}"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch --tags --force
          if [[ "$ENV" == "develop" ]]; then git checkout $VERSION;
          else git branch -f $ENV $VERSION; git push origin $ENV --force; git checkout $VERSION; fi
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          if [[ "$ENV" == "develop" ]]; then IMAGE="${{ secrets.DOCKER_USERNAME }}/aesthisia-demo";
          elif [[ "$ENV" == "beta" ]]; then IMAGE="${{ secrets.DOCKER_USERNAME }}/stage-test";
          elif [[ "$ENV" == "main" ]]; then IMAGE="${{ secrets.DOCKER_USERNAME }}/prod-test"; fi
          docker build -t $IMAGE:$VERSION .
          docker push $IMAGE:$VERSION

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    # Only run this if the deployment was to 'main'
    if: github.event.inputs.environment == 'main'
    steps:
      - name: Wait for 20 minutes
        run: sleep 1200

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Trigger Health Check Lambda
        run: |
          aws lambda invoke \
            --function-name Deepcarve_Backendwebsite_healthchecks \
            --invocation-type Event \
            response.json
