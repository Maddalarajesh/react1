name: CI-CD (Preview + Controlled Release + Cleanup)

permissions:
  contents: write

on:
  push:
    branches:
      - feature/*
      - develop

  pull_request:
    types: [opened, synchronize, reopened, closed]

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, beta, main]
      version:
        description: "Optional version"
        required: false

jobs:

  versioning:
    runs-on: [self-hosted, Windows, X64]
    if: |
      github.event_name == 'push' &&
      (
        startsWith(github.ref_name, 'feature/') ||
        github.ref_name == 'develop'
      )
    outputs:
      created_tag: ${{ steps.calc.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - id: calc
        shell: powershell
        run: |
          git fetch --tags --force
          $date = Get-Date -Format "yyyy-MM-dd"

          $todayTags = git tag --list "v*.[0-9][0-9][0-9]-$date"

          if ($todayTags) {
            $lastTag = $todayTags |
              ForEach-Object { $_ -replace "-$date","" -replace "^v","" } |
              Sort-Object { ($_ -split '\.')[0,1,2] } |
              Select-Object -Last 1
            $lastTag = "v$lastTag-$date"
          } else {
            $lastTag = git tag --list "v*.[0-9][0-9][0-9]-*" |
              ForEach-Object { $_ -replace "-.*","" -replace "^v","" } |
              Sort-Object { ($_ -split '\.')[0,1,2] } |
              Select-Object -Last 1
            if (-not $lastTag) { $lastTag = "1.0.000" }
            $lastTag = "v$lastTag-$date"
          }

          $version = $lastTag.TrimStart("v")
          $base = $version.Split("-")[0]
          $parts = $base.Split(".")
          $major = [int]$parts[0]; $minor = [int]$parts[1]; $patch = [int]$parts[2]

          $commitMsg = (git log -1 --pretty=%s).ToLower()
          if ($commitMsg -like "*enhancement*") {
            $major++; $minor=0; $patch=0
          } elseif ($commitMsg -like "*feature*") {
            $minor++; $patch=0
          } else {
            $patch++
          }

          $patchPadded = "{0:D3}" -f $patch
          $newTag = "v$major.$minor.$patchPadded-$date"

          echo "version=$newTag" >> $env:GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if (-not $tagExists) { 
            git tag -a $newTag -m "Release $newTag"
            git push origin $newTag
          }

  preview-deploy:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4

      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Set variables
        shell: powershell
        run: |
          $branch = "${{ github.event.pull_request.head.ref }}"
          $name = $branch.ToLower() -replace '[^a-z0-9]', '-'

          $namespace = $name
          $ingressHost = "$name.127.0.0.1.nip.io"
          $image = "${{ secrets.DOCKER_USERNAME }}/aesthisia-demo:$name-${{ github.run_number }}"

          "NAMESPACE=$namespace" >> $env:GITHUB_ENV
          "HOST=$ingressHost" >> $env:GITHUB_ENV
          "IMAGE=$image" >> $env:GITHUB_ENV

      - name: Docker Login
        shell: powershell
        run: docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Build & Push Image
        shell: powershell
        run: |
          docker build -t $env:IMAGE .
          docker push $env:IMAGE

      - name: Create Namespace
        shell: powershell
        run: kubectl create namespace $env:NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Application
        shell: powershell
        run: |
          (Get-Content deployment.yml) `
            -replace 'NAMESPACE_PLACEHOLDER', "$env:NAMESPACE" `
            -replace 'IMAGE_PLACEHOLDER', "$env:IMAGE" `
            -replace 'HOST_PLACEHOLDER', "$env:HOST" |
            kubectl apply -n $env:NAMESPACE -f -

      - name: Show Preview URL
        shell: powershell
        run: echo "http://$env:HOST"

  cleanup:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Delete Namespace
        shell: powershell
        run: |
          $branch = "${{ github.event.pull_request.head.ref }}"
          $name = $branch.ToLower() -replace '[^a-z0-9]', '-'
          kubectl delete namespace $name --ignore-not-found=true

  deploy:
    runs-on: [self-hosted, Windows, X64]
    if: github.event_name == 'workflow_dispatch'

    env:
      INPUT_ENV: ${{ inputs.environment }}
      INPUT_VERSION: ${{ inputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Fix PowerShell Execution Policy
        shell: powershell
        run: Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Resolve Version
        id: version
        shell: powershell
        run: |
          git fetch --tags --force
          if ([string]::IsNullOrEmpty($env:INPUT_VERSION)) {
            $version = git tag --sort=-v:refname | Select-Object -First 1
          } else {
            $version = $env:INPUT_VERSION
          }
          "resolved=$version" >> $env:GITHUB_OUTPUT

      - name: Docker Login
        shell: powershell
        run: docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Build & Push
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.resolved }}"
          $envName = $env:INPUT_ENV

          if ($envName -eq "develop") {
            $image = "${{ secrets.DOCKER_USERNAME }}/aesthisia-demo:$version"
          } elseif ($envName -eq "beta") {
            $image = "${{ secrets.DOCKER_USERNAME }}/stage-test:$version"
          } else {
            $image = "${{ secrets.DOCKER_USERNAME }}/prod-test:$version"
          }

          docker build -t $image .
          docker push $image

          kubectl create namespace $envName --dry-run=client -o yaml | kubectl apply -f -

          $ingressHost = "$envName.127.0.0.1.nip.io"

          (Get-Content deployment.yml) `
            -replace 'IMAGE_PLACEHOLDER', "$image" `
            -replace 'HOST_PLACEHOLDER', "$ingressHost" |
            kubectl apply -n $envName -f -

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'main'

    steps:
      - name: Wait
        run: sleep 1200

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_LAMBDA }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_LAMBDA }}
          aws-region: us-east-2

      - name: Invoke Lambda
        run: |
          aws lambda invoke \
            --function-name Deepcarve_Backendwebsite_healthchecks \
            --invocation-type RequestResponse \
            response.json
          cat response.json
